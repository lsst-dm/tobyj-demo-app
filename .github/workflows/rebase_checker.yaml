name: Check that 'main' is not merged into the development branch

on: pull_request

jobs:
  call-workflow:
    uses: lsst/rubin_workflows/.github/workflows/rebase_checker.yaml@u/tobyj/commitlint
    with:
      lint-commits: true
      rebase-checker: true
      do-not-merge-checker: true
      dependency-checker: true
      verbose: true
      workflow-ref: u/tobyj/commitlint
      custom-rules: .github/commitlint.ts
